name: PR Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  desktop-tests:
    name: Desktop tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run desktop tests
        run: ./gradlew desktopTest
